<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитално QR Меню</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- ОФИЦИАЛНОТО SDK НА SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-12">

    <!-- ХЕДЪР -->
    <header class="bg-amber-600 text-white text-center py-7 px-4 shadow-sm rounded-b-3xl relative">
        <h1 class="text-2xl font-black tracking-wide truncate mt-2" id="restaurant-title">Зареждане...</h1>
        <p class="text-[11px] opacity-90 mt-1 uppercase tracking-widest font-bold">Дигитално меню</p>
    </header>

    <!-- НАВИГАЦИЯ С КАТЕГОРИИ -->
    <div class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm z-10 py-3 mt-2">
        <div id="categories-nav" class="flex gap-2 overflow-x-auto px-4 no-scrollbar"></div>
    </div>

    <!-- СЪДЪРЖАНИЕ -->
    <main class="max-w-md mx-auto px-4 mt-4 space-y-8" id="menu-container">
        <div class="text-center py-12 text-gray-400 text-sm">Зареждане на менюто от облака...</div>
    </main>

    <!-- Основен скрипт -->
    <script src="app.js"></script>
</body>
</html>
