<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитално Меню</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Скриване на излишните елементи и ленти на Google Translate */
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon {
            display: none !important;
        }
        body {
            top: 0px !important;
        }
        .skiptranslate iframe {
            display: none !important;
        }
        .goog-text-highlight {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-12 font-sans antialiased text-gray-900">

    <!-- HEADER С КРАСИВОТО ПАДАЩО МЕНЮ -->
    <header class="bg-gradient-to-r from-amber-500 to-amber-600 text-white px-4 pt-6 pb-8 rounded-b-[2.5rem] shadow-md sticky top-0 z-40">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black tracking-tight drop-shadow-sm">Моето заведение</h1>
                <p id="sub-title" class="text-xs font-medium text-amber-100 uppercase tracking-wider mt-0.5">Дигитално меню</p>
            </div>
            
            <!-- Твоето оригинално селектор меню, управляващо Google зад кулисите -->
            <select id="language-select" onchange="triggerGoogleTranslate(this.value)" class="bg-amber-700 text-white border border-white/30 rounded-xl px-2 py-1 text-xs font-bold focus:outline-none backdrop-blur-md cursor-pointer shadow-sm">
                <option value="bg">BG 🇧🇬</option>
                <option value="en">EN 🇬🇧</option>
                <option value="el">EL 🇬🇷</option>
                <option value="ru">RU 🇷🇺</option>
                <option value="pl">PL 🇵🇱</option>
                <option value="tr">TR 🇹🇷</option>
            </select>
        </div>
    </header>

    <!-- ОСНОВНО СЪДЪРЖАНИЕ -->
    <main class="max-w-md mx-auto px-4 -mt-4">
        <!-- Навигация за категориите -->
        <nav id="categories-nav" class="flex gap-2 overflow-x-auto pb-3 pt-1 scrollbar-none"></nav>

        <!-- Контейнер за ястията -->
        <section id="menu-container" class="mt-2"></section>
    </main>

    <!-- НАПЪЛНО СКРИТ КОНТЕЙНЕР ЗА GOOGLE TRANSLATE -->
    <div id="google_translate_element" style="display:none;"></div>

    <!-- СВЪРЗВАНЕ НА СКРИПТОВЕТЕ ДИРЕКТНО В ROOT ПАПКАТА -->
    <script src="app.js"></script>

    <!-- Инициализация на Google Translate уиджета -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'bg', 
                includedLanguages: 'en,el,de,ru,pl,tr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }

        function triggerGoogleTranslate(langCode) {
            const googleSelect = document.querySelector('#google_translate_element select');
            if (googleSelect) {
                googleSelect.value = langCode;
                googleSelect.dispatchEvent(new Event('change'));
            }
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
