<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитално Меню</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative">
        
        <!-- Селектор за език (Само за клиенти) -->
        <div class="absolute top-4 right-4 z-20">
            <select id="language-select" onchange="changeLanguage(this.value)" class="bg-amber-700 text-white border border-white/30 rounded-xl px-2 py-1 text-xs font-bold focus:outline-none backdrop-blur-md cursor-pointer shadow-sm">
                <option value="bg">BG 🇧🇬</option>
                <option value="en">EN 🇬🇧</option>
                <option value="el">EL 🇬🇷</option>
                <option value="ru">RU 🇷🇺</option>
                <option value="pl">PL 🇵🇱</option>
                <option value="tr">TR 🇹🇷</option>
            </select>
        </div>

        <!-- Хедър -->
        <header class="bg-amber-600 text-white text-center py-6 px-4 shadow-sm rounded-b-3xl">
            <h1 class="text-2xl font-black tracking-wide truncate pr-16 text-left pl-2">Зареждане...</h1>
            <p id="sub-title" class="text-xs opacity-80 mt-1 uppercase tracking-wider font-semibold text-left pl-2">Дигитално меню</p>
        </header>

        <!-- Категории -->
        <nav class="sticky top-0 bg-white/90 backdrop-blur-md shadow-xs py-3 px-4 flex gap-2 overflow-x-auto no-scrollbar z-10" id="categories-nav">
            <!-- Зареждат се динамично -->
        </nav>

        <!-- Основна секция -->
        <main class="px-4 pb-10 flex-1" id="menu-container">
            <div class="flex justify-center items-center py-20">
                <p class="text-gray-400 text-sm">Зареждане на менюто...</p>
            </div>
        </main>
        
    </div>

    <script src="js/app.js"></script>
</body>
</html>
