<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитално Меню</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        
        <!-- Фиксиран хедър блок: Няма опасност нищо да закрие категориите, тъй като те следват нормалния поток под него -->
        <header class="bg-amber-600 text-white text-center py-6 px-4 shadow-sm rounded-b-3xl">
            <h1 class="text-2xl font-black tracking-wide truncate">Зареждане...</h1>
            <p class="text-xs opacity-80 mt-1 uppercase tracking-wider font-semibold">Дигитално меню</p>
        </header>

        <!-- Навигация по категории с лепкаво позициониране, независима от долен футър -->
        <nav class="sticky top-0 bg-white/95 backdrop-blur-md shadow-xs py-3.5 px-4 flex gap-2.5 overflow-x-auto no-scrollbar z-10 border-b border-gray-100" id="categories-nav">
            <!-- Категориите ще излязат тук -->
        </nav>

        <!-- Основен контейнер за артикули -->
        <main class="px-4 pt-2 pb-16 flex-1" id="menu-container">
            <div class="flex justify-center items-center py-20">
                <p class="text-gray-400 text-sm">Зареждане на менюто...</p>
            </div>
        </main>
        
    </div>

    <script src="js/app.js"></script>
</body>
</html>
