<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контролен Панел - Меню</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800 antialiased">

    <header class="bg-slate-800 text-white py-4 px-6 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">⚙️ Админ Панел</h1>
            <a href="index.html" target="_blank" class="text-sm bg-amber-500 hover:bg-amber-600 text-white font-bold py-1.5 px-4 rounded-xl transition shadow-sm">Към Менюто ↗</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- ЛЯВА КОЛОНА: НАСТРОЙКИ И ДОБАВЯНЕ -->
        <div class="space-y-6">
            <!-- Име на ресторанта -->
            <div class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100">
                <h2 class="text-base font-bold text-gray-700 mb-3">Име на заведението</h2>
                <div class="flex gap-2">
                    <input type="text" id="restaurant-name-input" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-amber-500" placeholder="Въведете име">
                    <button onclick="saveRestaurantName()" class="bg-slate-700 hover:bg-slate-800 text-white px-4 rounded-xl text-sm font-semibold transition">Запази</button>
                </div>
            </div>

            <!-- Форма за добавяне на ястие -->
            <div id="manual-entry-section" class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100 transition-opacity duration-300">
                <h2 class="text-base font-bold text-gray-700 mb-4">Добавяне на нов артикул</h2>
                <form id="add-dish-form" class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Име на ястието</label>
                        <input type="text" id="dish-name" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-amber-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Категория</label>
                            <select id="dish-category" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-amber-500">
                                <option value="Салати">Салати 🥗</option>
                                <option value="Основни">Основни 🍖</option>
                                <option value="Супи">Супи 🥣</option>
                                <option value="Десерти">Десерти 🍰</option>
                                <option value="Напитки">Напитки 🍹</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Цена (&euro;)</label>
                            <input type="number" id="dish-price" step="0.01" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-amber-500" placeholder="0.00">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">URL Снимка (по избор)</label>
                        <input type="text" id="dish-image" value="https://via.placeholder.com/150" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-amber-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Описание / Алергени</label>
                        <textarea id="dish-desc" rows="2" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-amber-500"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-xl text-sm transition shadow-sm mt-2">Добави в менюто</button>
                </form>
            </div>

            <!-- Секция за хартиено меню -->
            <div class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100">
                <h2 class="text-base font-bold text-gray-700 mb-2">Бърз режим: Снимка на меню</h2>
                <p class="text-xs text-gray-400 mb-3">Качете снимка, за да замените изцяло дигиталното въвеждане.</p>
                <input type="file" id="camera-input" accept="image/*" onchange="previewAndProcessImage(event)" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100 cursor-pointer">
                
                <div id="image-preview-container" class="mt-4 hidden p-2 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                    <img id="image-preview" src="" class="w-full h-auto max-h-40 object-cover rounded-lg">
                    <button onclick="removePaperMenu()" class="w-full mt-2 bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold py-1.5 rounded-lg transition">Изтриване на заснетото хартиено меню</button>
                </div>
            </div>
        </div>

        <!-- ДЯСНА КОЛОНА: СПИСЪК С АРТИКУЛИ -->
        <div class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100 flex flex-col h-full">
            <h2 class="text-base font-bold text-gray-700 mb-3 pb-2 border-b border-gray-100">Списък с въведени артикули</h2>
            <div id="admin-menu-list" class="divide-y divide-gray-100 overflow-y-auto max-h-[500px] pr-1"></div>
        </div>

    </main>

    <!-- СВЪРЗВАНЕ НА СКРИПТОВЕТЕ ДИРЕКТНО В ROOT ПАПКАТА -->
    <script src="admin.js"></script>

</body>
</html>
