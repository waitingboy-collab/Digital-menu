<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контролен панел - Меню</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Библиотека за четене на Excel (.xlsx/.xls) директно във Frontend -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans p-4">

    <div class="max-w-2xl mx-auto">
        <!-- Хедър -->
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
            <h1 class="text-xl font-bold text-gray-800">Управление на менюто</h1>
            <a href="index.html" class="text-sm text-amber-600 hover:underline">← Към менюто за клиенти</a>
        </header>

        <!-- Настройки на заведението -->
        <section class="bg-white p-5 rounded-xl shadow-sm mb-6">
            <h2 class="text-lg font-bold mb-3 text-gray-700">Настройки на заведението</h2>
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Име на ресторанта / кафето</label>
                <div class="flex gap-2">
                    <input type="text" id="restaurant-name-input" class="flex-1 border p-2 rounded-lg text-sm focus:outline-amber-600" placeholder="Въведете име...">
                    <button onclick="saveRestaurantName()" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-amber-700">Запази</button>
                </div>
            </div>
        </section>

        <!-- ИМПОРТ ОТ EXCEL / CSV -->
        <section class="bg-white p-5 rounded-xl shadow-sm mb-6">
            <h2 class="text-lg font-bold mb-1 text-gray-700">Импорт от Excel / CSV файл</h2>
            <p class="text-xs text-gray-500 mb-4">Качете файл, за да заредите цялото меню наведнъж. Колоните трябва да са: Име, Категория, Цена, Описание, Снимка.</p>
            
            <div class="flex flex-col gap-3 p-4 bg-amber-50 rounded-xl border border-amber-200">
                <input type="file" id="file-import" accept=".xlsx, .xls, .csv" class="text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-amber-600 file:text-white hover:file:bg-amber-700 cursor-pointer">
                <div class="flex justify-between items-center mt-2">
                    <button onclick="importFile()" class="bg-gray-800 text-white text-xs font-bold px-4 py-2 rounded-lg hover:bg-gray-700">Зареди данните от файла</button>
                    <button onclick="downloadTemplate()" class="text-amber-700 hover:underline text-xs font-semibold">⬇ Свали примерен CSV шаблон</button>
                </div>
            </div>
        </section>

        <!-- Качване/Снимане на хартиено меню -->
        <section class="bg-white p-5 rounded-xl shadow-sm mb-6">
            <h2 class="text-lg font-bold mb-2 text-gray-700">Снимане на хартиено меню</h2>
            <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-xl p-4 bg-gray-50">
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="previewAndProcessImage(event)">
                <label for="camera-input" class="cursor-pointer bg-gray-800 text-white px-4 py-2 rounded-lg font-bold text-sm shadow hover:bg-gray-700 transition">
                    📸 Снимай с камерата
                </label>
                <div id="image-preview-container" class="mt-4 hidden w-full max-w-xs">
                    <img id="image-preview" src="" class="rounded-lg shadow-md w-full object-contain max-h-60">
                    <button onclick="removePaperMenu()" class="w-full mt-2 bg-red-100 text-red-600 text-xs py-1 rounded font-semibold">Изтрий снимката</button>
                </div>
            </div>
        </section>

        <!-- Форма за ръчно добавяне -->
        <section class="bg-white p-5 rounded-xl shadow-sm mb-6" id="manual-entry-section">
            <h2 class="text-lg font-bold mb-4 text-gray-700">Или добави артикул ръчно</h2>
            <form id="add-dish-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Име на ястието</label>
                    <input type="text" id="dish-name" required class="w-full border p-2 rounded-lg text-sm focus:outline-amber-600">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Категория</label>
                    <select id="dish-category" class="w-full border p-2 rounded-lg text-sm focus:outline-amber-600">
                        <option value="Топли напитки">Топли напитки</option>
                        <option value="Напитки">Студени напитки</option>
                        <option value="Салати">Салати</option>
                        <option value="Основни">Основни</option>
                        <option value="Десерти">Десерти</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Цена (&euro;)</label>
                    <input type="number" step="0.01" id="dish-price" required class="w-full border p-2 rounded-lg text-sm focus:outline-amber-600">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Линк към снимка</label>
                    <input type="url" id="dish-image" value="https://via.placeholder.com/150" class="w-full border p-2 rounded-lg text-sm focus:outline-amber-600">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Описание / Алергени</label>
                    <textarea id="dish-desc" rows="2" class="w-full border p-2 rounded-lg text-sm focus:outline-amber-600"></textarea>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="w-full bg-amber-600 text-white font-bold py-2 rounded-lg hover:bg-amber-700 transition">Добави в менюто</button>
                </div>
            </form>
        </section>

        <!-- Списък с текущите артикули -->
        <section class="bg-white p-5 rounded-xl shadow-sm">
            <h2 class="text-lg font-bold mb-4 text-gray-700">Текущи артикули</h2>
            <div id="admin-menu-list" class="divide-y divide-gray-100"></div>
        </section>
    </div>

    <script src="admin.js"></script>
</body>
</html>
